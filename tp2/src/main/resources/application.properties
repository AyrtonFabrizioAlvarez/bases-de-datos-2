
# CONFIGURACIÓN DEL DATASOURCE (CONEXIÓN)
# URL de conexión al motor de base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/bd2_tours_0

# Credenciales de acceso
spring.datasource.username=root
spring.datasource.password=root

# Clase del driver JDBC específica del motor
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN DE JPA / HIBERNATE
# Dialecto para que Hibernate genere el SQL correcto
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Control de la generación automática del esquema (ddl-auto)
# Valores comunes: update, create, validate, none
spring.jpa.hibernate.ddl-auto=update

# OPCIONES DE DEPURACIÓN (LOGGING)
# Muestra las sentencias SQL generadas en la consola
spring.jpa.show-sql=true

# Formatea el SQL para que sea más legible en la consola
spring.jpa.properties.hibernate.format_sql=true

spring.test.database.replace=none